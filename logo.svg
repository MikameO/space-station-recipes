<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="liquid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39ff85" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#39ff85" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#06090f" rx="8"/>

  <!-- Beaker icon (Erlenmeyer flask) -->
  <g transform="translate(60, 28)" filter="url(#glow)">
    <!-- Beaker neck -->
    <rect x="48" y="0" width="48" height="50" fill="none" stroke="#39ff85" stroke-width="3" rx="2"/>
    <!-- Beaker body -->
    <path d="M48,50 L20,110 Q12,130 30,140 L114,140 Q132,130 124,110 L96,50"
          fill="none" stroke="#39ff85" stroke-width="3" stroke-linejoin="round"/>
    <!-- Liquid fill -->
    <path d="M36,100 Q30,120 38,132 L106,132 Q114,120 108,100 Z"
          fill="url(#liquid)" opacity="0.6"/>
    <!-- Bubbles -->
    <circle cx="60" cy="108" r="4" fill="none" stroke="#39ff85" stroke-width="1.5" opacity="0.6"/>
    <circle cx="80" cy="98" r="3" fill="none" stroke="#39ff85" stroke-width="1.5" opacity="0.4"/>
    <circle cx="90" cy="114" r="5" fill="none" stroke="#39ff85" stroke-width="1.5" opacity="0.5"/>
    <!-- Measurement lines -->
    <line x1="28" y1="110" x2="40" y2="110" stroke="#39ff85" stroke-width="1.5" opacity="0.4"/>
    <line x1="24" y1="120" x2="36" y2="120" stroke="#39ff85" stroke-width="1.5" opacity="0.4"/>
    <line x1="42" y1="90" x2="50" y2="90" stroke="#39ff85" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Text: NanoTrasen -->
  <text x="220" y="95" font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="52" font-weight="400" fill="#39ff85" filter="url(#glow)" letter-spacing="3">
    NanoTrasen
  </text>

  <!-- Text: ChemDB -->
  <text x="220" y="152" font-family="'Oxanium', 'Courier New', monospace"
        font-size="58" font-weight="700" fill="#39ff85" filter="url(#glow-strong)" letter-spacing="5">
    ChemDB
  </text>

  <!-- Decorative line -->
  <line x1="220" y1="105" x2="720" y2="105" stroke="#39ff85" stroke-width="1" opacity="0.2"/>

  <!-- Version / subtitle -->
  <text x="720" y="170" font-family="'Share Tech Mono', 'Courier New', monospace"
        font-size="14" fill="#39ff85" opacity="0.5" text-anchor="end">
    v1.0 // SS14
  </text>

  <!-- Scanline effect overlay -->
  <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="2" fill="transparent"/>
    <rect y="2" width="4" height="2" fill="#000" opacity="0.08"/>
  </pattern>
  <rect width="800" height="200" fill="url(#scanlines)" rx="8"/>
</svg>